<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>活動後台管理</title>

  <style>
    :root{
      --bg:#f5f8fc;
      --panel:#ffffff;
      --panel-soft:#f9fbfe;
      --line:#d9e6f5;
      --line-strong:#bfd4ee;
      --text:#1d2b3a;
      --text-soft:#5f748b;
      --primary:#4a90e2;
      --primary-2:#6cb6ff;
      --green:#38b36e;
      --danger:#d95c68;
      --warn:#d89218;
      --shadow:0 10px 28px rgba(74,144,226,.10);
      --shadow-soft:0 8px 18px rgba(31,76,125,.08);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:14px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:
        radial-gradient(circle at top left, rgba(108,182,255,.18), transparent 26%),
        radial-gradient(circle at top right, rgba(74,144,226,.10), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, #eef5fc 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      min-height:100vh;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button, input, textarea, select{
      font-family:inherit;
    }

    .page{
      max-width:1460px;
      margin:0 auto;
      padding:18px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:16px 18px;
      background:rgba(255,255,255,.86);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow-soft);
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .brand-kicker{
      color:var(--primary);
      font-size:13px;
      font-weight:800;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    .brand-title{
      font-size:30px;
      font-weight:900;
      line-height:1.2;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:1px solid var(--line-strong);
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      transition:.2s ease;
      box-shadow:0 4px 10px rgba(74,144,226,.05);
    }

    .btn:hover{
      transform:translateY(-1px);
      border-color:#9fc1ea;
      box-shadow:0 10px 18px rgba(74,144,226,.12);
    }

    .btn-primary{
      background:linear-gradient(180deg, #78b9ff, #4a90e2);
      color:#fff;
      border-color:#5ca2ef;
    }

    .btn-danger{
      background:#fff4f5;
      color:#b64655;
      border-color:#f1c9cf;
    }

    .btn-warning{
      background:#fff8eb;
      color:#b9770b;
      border-color:#f2ddb1;
    }

    .grid{
      display:grid;
      grid-template-columns: 450px 1fr;
      gap:18px;
    }

    .panel{
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow-soft);
      overflow:hidden;
    }

    .panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:18px 20px;
      border-bottom:1px solid #edf3fa;
      flex-wrap:wrap;
    }

    .panel-title{
      font-size:22px;
      font-weight:900;
      line-height:1.2;
    }

    .panel-subtitle{
      color:var(--text-soft);
      font-size:13px;
      font-weight:700;
      margin-top:4px;
    }

    .panel-body{
      padding:18px;
    }

    .status-box{
      margin-top:14px;
      min-height:22px;
      color:var(--text-soft);
      font-size:14px;
      font-weight:700;
      line-height:1.7;
    }

    .ok-box,
    .warn-box,
    .error-box,
    .loading-box{
      border-radius:16px;
      padding:14px;
      font-size:14px;
      font-weight:700;
      line-height:1.8;
    }

    .ok-box{
      border:1px solid #cfeedd;
      background:#eefaf4;
      color:#28784d;
    }

    .warn-box{
      border:1px solid #f2ddb1;
      background:#fff8eb;
      color:#a86f12;
    }

    .error-box{
      border:1px solid #f1c9cf;
      background:#fff4f5;
      color:#b64655;
    }

    .loading-box{
      border:1px solid #dce9f8;
      background:#f6fbff;
      color:#53708d;
    }

    .form-grid{
      display:grid;
      gap:14px;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .field label{
      font-size:13px;
      font-weight:900;
      letter-spacing:1px;
      color:#5b84ae;
    }

    .field input,
    .field textarea,
    .field select{
      width:100%;
      border:1px solid #d9e6f5;
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
      transition:.18s ease;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus{
      border-color:#9fc1ea;
      box-shadow:0 0 0 4px rgba(74,144,226,.10);
    }

    .field textarea{
      min-height:120px;
      resize:vertical;
    }

    .field input[type="color"]{
      padding:6px;
      height:50px;
    }

    .field small{
      color:var(--text-soft);
      font-size:12px;
      font-weight:700;
      line-height:1.6;
    }

    .row-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .inline-check{
      display:flex;
      align-items:center;
      gap:10px;
      padding:6px 2px 0;
      flex-wrap:wrap;
    }

    .inline-check input{
      width:auto;
      transform:translateY(1px);
    }

    .action-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    .list-wrap{
      display:grid;
      gap:12px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:14px;
    }

    .search{
      flex:1 1 240px;
      min-width:220px;
    }

    .search input{
      width:100%;
      border:1px solid #d9e6f5;
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
    }

    .count-badge{
      display:inline-flex;
      align-items:center;
      min-height:38px;
      padding:0 12px;
      border-radius:999px;
      background:#eef6ff;
      color:#4a90e2;
      font-size:13px;
      font-weight:900;
    }

    .event-list{
      display:grid;
      gap:12px;
    }

    .item{
      border:1px solid #e0ebf7;
      background:linear-gradient(180deg, #ffffff, #f9fbff);
      border-radius:18px;
      padding:14px;
      display:grid;
      gap:10px;
      transition:.18s ease;
    }

    .item:hover{
      box-shadow:0 10px 18px rgba(46,93,143,.08);
      border-color:#cde0f3;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .item-main{
      display:flex;
      gap:10px;
      flex:1;
      min-width:0;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:999px;
      margin-top:7px;
      box-shadow:0 0 0 3px rgba(74,144,226,.10);
      flex:0 0 auto;
    }

    .item-title{
      font-size:20px;
      font-weight:900;
      line-height:1.35;
      color:#223446;
      word-break:break-word;
    }

    .item-tags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .tag-blue{ background:#eef6ff; color:#4a90e2; }
    .tag-green{ background:#e9f9f1; color:#2f9961; }
    .tag-orange{ background:#fff6e9; color:#d68a10; }
    .tag-purple{ background:#f3edff; color:#7d58cf; }
    .tag-gray{ background:#f1f4f8; color:#6b7d91; }

    .item-meta{
      color:#5e7388;
      font-size:14px;
      font-weight:700;
      line-height:1.8;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    iframe{
      display:none;
      width:0;
      height:0;
      border:0;
    }

    @media (max-width: 1120px){
      .grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 760px){
      .page{
        padding:12px;
      }

      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .brand-title{
        font-size:26px;
      }

      .panel-head{
        flex-direction:column;
        align-items:flex-start;
      }

      .row-2{
        grid-template-columns:1fr;
      }

      .item-top{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div class="brand-kicker">Event Admin</div>
        <div class="brand-title">活動後台管理</div>
      </div>

      <div class="top-actions">
        <a class="btn" href="./index.html">前台首頁</a>
        <a class="btn" href="./region.html">台灣區域頁</a>
        <button class="btn btn-warning" type="button" id="btnReset">清空表單</button>
        <button class="btn btn-primary" type="button" id="btnReload">重新整理</button>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">活動表單</div>
            <div class="panel-subtitle">新增、修改、刪除活動資料</div>
          </div>
        </div>

        <div class="panel-body">
          <div class="form-grid">
            <div class="field">
              <label for="password">管理密碼</label>
              <input id="password" type="password" value="12345678" autocomplete="off">
              <small>請改成你在 Apps Script 裡設定的 ADMIN_PASSWORD。</small>
            </div>

            <input id="id" type="hidden">

            <div class="field">
              <label for="title">活動名稱</label>
              <input id="title" type="text" placeholder="例如：工程安全教育">
            </div>

            <div class="row-2">
              <div class="field">
                <label for="start">開始時間</label>
                <input id="start" type="datetime-local">
              </div>

              <div class="field">
                <label for="end">結束時間</label>
                <input id="end" type="datetime-local">
              </div>
            </div>

            <div class="inline-check">
              <input id="allDay" type="checkbox">
              <label for="allDay" style="font-weight:900; color:#35516d;">全天活動</label>
            </div>

            <div class="row-2">
              <div class="field">
                <label for="location">活動地點</label>
                <input id="location" type="text" placeholder="例如：南投市文化中心">
              </div>

              <div class="field">
                <label for="region">活動區域</label>
                <select id="region">
                  <option value="">自動判斷</option>
                  <option value="北部">北部</option>
                  <option value="中部">中部</option>
                  <option value="南部">南部</option>
                  <option value="東部">東部</option>
                  <option value="離島">離島</option>
                  <option value="未分類">未分類</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="description">活動內容</label>
              <textarea id="description" placeholder="可輸入活動詳細說明"></textarea>
            </div>

            <div class="row-2">
              <div class="field">
                <label for="eventLink">活動連結</label>
                <input id="eventLink" type="text" placeholder="例如：https://example.com/event">
              </div>

              <div class="field">
                <label for="color">活動顏色</label>
                <input id="color" type="color" value="#4a90e2">
              </div>
            </div>

            <div class="action-row">
              <button class="btn btn-primary" type="button" id="btnSave">儲存活動</button>
              <button class="btn btn-danger" type="button" id="btnDelete">刪除活動</button>
            </div>
          </div>

          <div class="status-box" id="statusBox">尚未操作。</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">活動清單</div>
            <div class="panel-subtitle">點選編輯即可帶入表單</div>
          </div>
        </div>

        <div class="panel-body">
          <div class="toolbar">
            <div class="search">
              <input id="searchInput" type="text" placeholder="搜尋活動名稱、地點、區域">
            </div>
            <div class="count-badge" id="countBadge">共 0 筆</div>
          </div>

          <div class="list-wrap">
            <div class="event-list" id="eventList">
              <div class="loading-box">活動資料載入中...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <iframe name="hiddenFrame" id="hiddenFrame"></iframe>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxUz8ob0qV6G7cmGAYwqKvR7UCisLAEsiKv2GKqwKmST7HG1YsO2iTFgSIZIulicIqi/exec';

    let allEvents = [];
    let pendingAction = '';

    function $(id) {
      return document.getElementById(id);
    }

    function safe(v) {
      return String(v == null ? '' : v).replace(/[&<>"']/g, function(s) {
        return {
          '&':'&amp;',
          '<':'&lt;',
          '>':'&gt;',
          '"':'&quot;',
          "'":'&#39;'
        }[s];
      });
    }

    function safeText(v, fallback = '') {
      const s = String(v == null ? '' : v).trim();
      return s || fallback;
    }

    function jsonp(url, timeoutMs = 12000) {
      return new Promise((resolve, reject) => {
        const cbName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        let done = false;
        let timer = null;
        let script = null;

        function cleanup() {
          if (timer) clearTimeout(timer);
          if (script && script.parentNode) script.parentNode.removeChild(script);
          try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
        }

        window[cbName] = function(data) {
          if (done) return;
          done = true;
          cleanup();
          resolve(data);
        };

        script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
        script.async = true;

        script.onerror = function() {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('JSONP 載入失敗'));
        };

        timer = setTimeout(function() {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('JSONP 載入逾時'));
        }, timeoutMs);

        document.body.appendChild(script);
      });
    }

    function setStatus(type, text) {
      const box = $('statusBox');
      if (!text) {
        box.textContent = '';
        return;
      }

      if (type === 'ok') {
        box.innerHTML = '<div class="ok-box">' + safe(text) + '</div>';
      } else if (type === 'error') {
        box.innerHTML = '<div class="error-box">' + safe(text) + '</div>';
      } else if (type === 'warn') {
        box.innerHTML = '<div class="warn-box">' + safe(text) + '</div>';
      } else {
        box.innerHTML = '<div class="loading-box">' + safe(text) + '</div>';
      }
    }

    function parseDate(v) {
      if (!v) return null;
      const d = new Date(v);
      return isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(v, allDay) {
      const d = parseDate(v);
      if (!d) return safeText(v, '未設定');

      if (allDay) {
        return d.toLocaleDateString('zh-TW', {
          year:'numeric',
          month:'2-digit',
          day:'2-digit',
          weekday:'short'
        });
      }

      return d.toLocaleString('zh-TW', {
        year:'numeric',
        month:'2-digit',
        day:'2-digit',
        hour:'2-digit',
        minute:'2-digit',
        hour12:false
      });
    }

    function toDatetimeLocalString(v) {
      const d = parseDate(v);
      if (!d) return '';
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      return yyyy + '-' + mm + '-' + dd + 'T' + hh + ':' + mi;
    }

    function normalizeEvents(rawEvents) {
      if (!Array.isArray(rawEvents)) return [];

      return rawEvents.map(function(e) {
        const p = e && e.extendedProps ? e.extendedProps : {};
        return {
          id: safeText(e.id, 'EVT-' + Math.random().toString(36).slice(2)),
          title: safeText(e.title, '未命名活動'),
          start: safeText(e.start, ''),
          end: safeText(e.end, ''),
          allDay: !!e.allDay,
          color: safeText(e.color, '#4a90e2'),
          extendedProps: {
            location: safeText(p.location, ''),
            description: safeText(p.description, ''),
            updateAt: safeText(p.updateAt, ''),
            eventLink: safeText(p.eventLink, ''),
            region: safeText(p.region, '未分類')
          }
        };
      });
    }

    function getColor(e) {
      const c = safeText(e && e.color, '#4a90e2');
      return /^#[0-9a-fA-F]{6}$/.test(c) ? c : '#4a90e2';
    }

    function resetForm() {
      $('id').value = '';
      $('title').value = '';
      $('start').value = '';
      $('end').value = '';
      $('allDay').checked = false;
      $('location').value = '';
      $('region').value = '';
      $('description').value = '';
      $('eventLink').value = '';
      $('color').value = '#4a90e2';
      setStatus('ok', '已切換為新增模式。');
    }

    function fillForm(e) {
      $('id').value = safeText(e.id, '');
      $('title').value = safeText(e.title, '');
      $('start').value = toDatetimeLocalString(e.start);
      $('end').value = toDatetimeLocalString(e.end);
      $('allDay').checked = !!e.allDay;
      $('location').value = safeText(e.extendedProps && e.extendedProps.location, '');
      $('region').value = safeText(e.extendedProps && e.extendedProps.region, '');
      $('description').value = safeText(e.extendedProps && e.extendedProps.description, '');
      $('eventLink').value = safeText(e.extendedProps && e.extendedProps.eventLink, '');
      $('color').value = getColor(e);
      setStatus('ok', '已帶入活動資料，可直接修改後儲存。');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function validateForm() {
      const title = safeText($('title').value);
      const start = safeText($('start').value);

      if (!safeText(API_URL) || API_URL === 'YOUR_GAS_WEBAPP_URL') {
        setStatus('error', '尚未設定 API_URL，請先把 admin.html 裡的 YOUR_GAS_WEBAPP_URL 換成你的 Apps Script 網址。');
        return false;
      }

      if (!safeText($('password').value)) {
        setStatus('warn', '請輸入管理密碼。');
        $('password').focus();
        return false;
      }

      if (!title) {
        setStatus('warn', '請輸入活動名稱。');
        $('title').focus();
        return false;
      }

      if (!start) {
        setStatus('warn', '請輸入開始時間。');
        $('start').focus();
        return false;
      }

      return true;
    }

    function createHiddenForm(data) {
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = API_URL;
      form.target = 'hiddenFrame';
      form.style.display = 'none';

      Object.keys(data).forEach(function(key) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = data[key] == null ? '' : String(data[key]);
        form.appendChild(input);
      });

      document.body.appendChild(form);
      return form;
    }

    function submitUpsert() {
      if (!validateForm()) return;

      const data = {
        action: 'upsert',
        password: safeText($('password').value),
        id: safeText($('id').value),
        title: safeText($('title').value),
        start: safeText($('start').value),
        end: safeText($('end').value),
        allDay: $('allDay').checked ? 'true' : 'false',
        location: safeText($('location').value),
        region: safeText($('region').value),
        description: safeText($('description').value),
        color: safeText($('color').value, '#4a90e2'),
        eventLink: safeText($('eventLink').value)
      };

      const form = createHiddenForm(data);
      pendingAction = data.id ? 'update' : 'create';
      setStatus('loading', '資料送出中，請稍候...');

      form.submit();

      setTimeout(function() {
        if (form.parentNode) form.parentNode.removeChild(form);
      }, 1200);

      setTimeout(async function() {
        try {
          await loadEvents();
          setStatus('ok', pendingAction === 'update' ? '活動已更新。' : '活動已新增。');
          if (pendingAction !== 'update') {
            resetForm();
          }
        } catch (err) {
          setStatus('error', '送出後重新讀取失敗，請按重新整理再確認。');
        }
      }, 1500);
    }

    function submitDelete() {
      const id = safeText($('id').value);

      if (!safeText(API_URL) || API_URL === 'YOUR_GAS_WEBAPP_URL') {
        setStatus('error', '尚未設定 API_URL。');
        return;
      }

      if (!safeText($('password').value)) {
        setStatus('warn', '請輸入管理密碼。');
        $('password').focus();
        return;
      }

      if (!id) {
        setStatus('warn', '請先從清單點選一筆活動，再執行刪除。');
        return;
      }

      const ok = confirm('確定要刪除這筆活動嗎？刪除後無法復原。');
      if (!ok) return;

      const form = createHiddenForm({
        action: 'delete',
        password: safeText($('password').value),
        id: id
      });

      pendingAction = 'delete';
      setStatus('loading', '刪除中，請稍候...');

      form.submit();

      setTimeout(function() {
        if (form.parentNode) form.parentNode.removeChild(form);
      }, 1200);

      setTimeout(async function() {
        try {
          await loadEvents();
          resetForm();
          setStatus('ok', '活動已刪除。');
        } catch (err) {
          setStatus('error', '刪除後重新讀取失敗，請按重新整理再確認。');
        }
      }, 1500);
    }

    function renderList(events) {
      const list = $('eventList');

      if (!Array.isArray(events) || !events.length) {
        list.innerHTML = '<div class="loading-box">目前沒有活動資料。</div>';
        $('countBadge').textContent = '共 0 筆';
        return;
      }

      $('countBadge').textContent = '共 ' + events.length + ' 筆';

      list.innerHTML = events.map(function(e) {
        const location = safeText(e.extendedProps && e.extendedProps.location, '未填地點');
        const region = safeText(e.extendedProps && e.extendedProps.region, '未分類');
        const desc = safeText(e.extendedProps && e.extendedProps.description, '未填說明');
        const eventLink = safeText(e.extendedProps && e.extendedProps.eventLink, '');
        const updateAt = safeText(e.extendedProps && e.extendedProps.updateAt, '未更新');
        const color = safe(getColor(e));

        return (
          '<div class="item">' +
            '<div class="item-top">' +
              '<div class="item-main">' +
                '<div class="dot" style="background:' + color + ';"></div>' +
                '<div>' +
                  '<div class="item-title">' + safe(e.title) + '</div>' +
                  '<div class="item-tags">' +
                    '<span class="tag tag-blue">' + safe(region) + '</span>' +
                    '<span class="tag ' + (e.allDay ? 'tag-purple' : 'tag-green') + '">' + (e.allDay ? '全天活動' : '一般活動') + '</span>' +
                    '<span class="tag tag-orange">' + (eventLink ? '有連結' : '無連結') + '</span>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>' +

            '<div class="item-meta">' +
              safe(formatDateTime(e.start, e.allDay)) + (e.end ? ' → ' + safe(formatDateTime(e.end, e.allDay)) : '') + '\n' +
              safe(location) + '\n' +
              safe(desc) + '\n' +
              '最後更新：' + safe(updateAt) +
            '</div>' +

            '<div class="item-actions">' +
              '<button class="btn btn-primary" type="button" data-edit="' + safe(e.id) + '">編輯</button>' +
              (eventLink
                ? '<a class="btn" href="' + safe(eventLink) + '" target="_blank" rel="noopener noreferrer">開啟連結</a>'
                : '') +
            '</div>' +
          '</div>'
        );
      }).join('');

      list.querySelectorAll('[data-edit]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const id = btn.getAttribute('data-edit');
          const found = allEvents.find(function(x) { return String(x.id) === String(id); });
          if (found) fillForm(found);
        });
      });
    }

    function getFilteredEvents() {
      const keyword = safeText($('searchInput').value).toLowerCase();

      if (!keyword) return allEvents.slice();

      return allEvents.filter(function(e) {
        const title = safeText(e.title).toLowerCase();
        const location = safeText(e.extendedProps && e.extendedProps.location).toLowerCase();
        const region = safeText(e.extendedProps && e.extendedProps.region).toLowerCase();
        const desc = safeText(e.extendedProps && e.extendedProps.description).toLowerCase();
        return (
          title.includes(keyword) ||
          location.includes(keyword) ||
          region.includes(keyword) ||
          desc.includes(keyword)
        );
      });
    }

    async function loadEvents() {
      setStatus('loading', '活動資料讀取中...');

      const data = await jsonp(API_URL + '?action=list');

      if (!data || !data.ok) {
        throw new Error((data && data.message) ? data.message : 'API 回傳失敗');
      }

      allEvents = normalizeEvents(data.events || []);
      allEvents.sort(function(a, b) {
        const ta = parseDate(a.start) ? parseDate(a.start).getTime() : 0;
        const tb = parseDate(b.start) ? parseDate(b.start).getTime() : 0;
        return ta - tb;
      });

      renderList(getFilteredEvents());
      setStatus('ok', '活動資料已載入。');
    }

    function bindEvents() {
      $('btnReset').addEventListener('click', resetForm);
      $('btnReload').addEventListener('click', function() {
        loadEvents().catch(function(err) {
          setStatus('error', err && err.message ? err.message : '重新整理失敗');
        });
      });
      $('btnSave').addEventListener('click', submitUpsert);
      $('btnDelete').addEventListener('click', submitDelete);

      $('searchInput').addEventListener('input', function() {
        renderList(getFilteredEvents());
      });

      $('allDay').addEventListener('change', function() {
        if ($('allDay').checked) {
          if ($('start').value && !$('end').value) {
            $('end').value = $('start').value;
          }
        }
      });
    }

    async function boot() {
      try {
        if (!API_URL || API_URL === 'https://script.google.com/macros/s/AKfycbxUz8ob0qV6G7cmGAYwqKvR7UCisLAEsiKv2GKqwKmST7HG1YsO2iTFgSIZIulicIqi/exec') {
          throw new Error('尚未設定 API_URL，請先把 admin.html 裡的 YOUR_GAS_WEBAPP_URL 換成你的 Apps Script 網址。');
        }

        bindEvents();
        await loadEvents();
      } catch (err) {
        console.error(err);
        setStatus('error', err && err.message ? err.message : '系統初始化失敗');
        $('eventList').innerHTML = '<div class="error-box">無法載入活動資料，請確認 Apps Script 是否已部署、API_URL 是否正確、Web App 權限是否為任何人。</div>';
      }
    }

    boot();
  </script>
</body>
</html>
