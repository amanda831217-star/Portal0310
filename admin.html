<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>活動後台管理</title>

  <style>
    :root{
      --bg:#f5f8fc;
      --panel:#ffffff;
      --panel-soft:#f9fbfe;
      --line:#d9e6f5;
      --line-strong:#bfd4ee;
      --text:#1d2b3a;
      --text-soft:#5f748b;
      --primary:#4a90e2;
      --meeting:#8e6dd8;
      --site:#f5a623;
      --green:#38b36e;
      --danger:#d95c68;
      --warn:#d89218;
      --shadow:0 10px 28px rgba(74,144,226,.10);
      --shadow-soft:0 8px 18px rgba(31,76,125,.08);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:
        radial-gradient(circle at top left, rgba(108,182,255,.18), transparent 26%),
        radial-gradient(circle at top right, rgba(74,144,226,.10), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, #eef5fc 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      min-height:100vh;
    }

    a{ color:inherit; text-decoration:none; }
    button, input, textarea, select{ font-family:inherit; }

    .page{
      max-width:1520px;
      margin:0 auto;
      padding:18px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:16px 18px;
      background:rgba(255,255,255,.86);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow-soft);
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .brand-kicker{
      color:var(--primary);
      font-size:13px;
      font-weight:800;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    .brand-title{
      font-size:30px;
      font-weight:900;
      line-height:1.2;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:1px solid var(--line-strong);
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      transition:.2s ease;
      box-shadow:0 4px 10px rgba(74,144,226,.05);
      min-height:44px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn:hover{
      transform:translateY(-1px);
      border-color:#9fc1ea;
      box-shadow:0 10px 18px rgba(74,144,226,.12);
    }

    .btn-primary{
      background:linear-gradient(180deg, #78b9ff, #4a90e2);
      color:#fff;
      border-color:#5ca2ef;
    }

    .btn-danger{
      background:#fff4f5;
      color:#b64655;
      border-color:#f1c9cf;
    }

    .btn-warning{
      background:#fff8eb;
      color:#b9770b;
      border-color:#f2ddb1;
    }

    .btn-green{
      background:#eefaf4;
      color:#28784d;
      border-color:#cfeedd;
    }

    .grid{
      display:grid;
      grid-template-columns: 520px 1fr;
      gap:18px;
    }

    .stack{
      display:grid;
      gap:18px;
    }

    .panel{
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow-soft);
      overflow:hidden;
    }

    .panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:18px 20px;
      border-bottom:1px solid #edf3fa;
      flex-wrap:wrap;
    }

    .panel-title{
      font-size:22px;
      font-weight:900;
      line-height:1.2;
    }

    .panel-subtitle{
      color:var(--text-soft);
      font-size:13px;
      font-weight:700;
      margin-top:4px;
    }

    .panel-body{
      padding:18px;
    }

    .status-box{
      margin-top:14px;
      min-height:22px;
      color:var(--text-soft);
      font-size:14px;
      font-weight:700;
      line-height:1.7;
    }

    .ok-box, .warn-box, .error-box, .loading-box{
      border-radius:16px;
      padding:14px;
      font-size:14px;
      font-weight:700;
      line-height:1.8;
    }

    .ok-box{
      border:1px solid #cfeedd;
      background:#eefaf4;
      color:#28784d;
    }

    .warn-box{
      border:1px solid #f2ddb1;
      background:#fff8eb;
      color:#a86f12;
    }

    .error-box{
      border:1px solid #f1c9cf;
      background:#fff4f5;
      color:#b64655;
    }

    .loading-box{
      border:1px solid #dce9f8;
      background:#f6fbff;
      color:#53708d;
    }

    .form-grid{
      display:grid;
      gap:14px;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .field label{
      font-size:13px;
      font-weight:900;
      letter-spacing:1px;
      color:#5b84ae;
    }

    .field input,
    .field textarea,
    .field select{
      width:100%;
      border:1px solid #d9e6f5;
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
      transition:.18s ease;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus{
      border-color:#9fc1ea;
      box-shadow:0 0 0 4px rgba(74,144,226,.10);
    }

    .field textarea{
      min-height:110px;
      resize:vertical;
    }

    .field input[type="color"]{
      padding:6px;
      height:50px;
    }

    .field small{
      color:var(--text-soft);
      font-size:12px;
      font-weight:700;
      line-height:1.6;
    }

    .row-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .inline-check{
      display:flex;
      align-items:center;
      gap:10px;
      padding:6px 2px 0;
      flex-wrap:wrap;
    }

    .inline-check input{
      width:auto;
      transform:translateY(1px);
    }

    .section-card{
      border:1px solid #e3edf8;
      background:#f9fbff;
      border-radius:18px;
      padding:14px;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .section-title{
      font-size:16px;
      font-weight:900;
      color:#2e4b68;
    }

    .links-wrap{
      display:grid;
      gap:10px;
    }

    .link-row{
      display:grid;
      grid-template-columns: 1fr 1.5fr auto;
      gap:10px;
      align-items:center;
    }

    .link-row input{
      width:100%;
      border:1px solid #d9e6f5;
      background:#fff;
      color:var(--text);
      border-radius:12px;
      padding:11px 12px;
      font-size:14px;
      outline:none;
    }

    .action-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:14px;
    }

    .search{
      flex:1 1 260px;
      min-width:220px;
    }

    .search input{
      width:100%;
      border:1px solid #d9e6f5;
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
    }

    .count-badge{
      display:inline-flex;
      align-items:center;
      min-height:38px;
      padding:0 12px;
      border-radius:999px;
      background:#eef6ff;
      color:#4a90e2;
      font-size:13px;
      font-weight:900;
    }

    .list{
      display:grid;
      gap:12px;
    }

    .item{
      border:1px solid #e0ebf7;
      background:linear-gradient(180deg, #ffffff, #f9fbff);
      border-radius:18px;
      padding:14px;
      display:grid;
      gap:10px;
      transition:.18s ease;
    }

    .item:hover{
      box-shadow:0 10px 18px rgba(46,93,143,.08);
      border-color:#cde0f3;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .item-main{
      display:flex;
      gap:10px;
      flex:1;
      min-width:0;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:999px;
      margin-top:7px;
      box-shadow:0 0 0 3px rgba(74,144,226,.10);
      flex:0 0 auto;
    }

    .item-title{
      font-size:20px;
      font-weight:900;
      line-height:1.35;
      color:#223446;
      word-break:break-word;
    }

    .item-tags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .tag-blue{ background:#eef6ff; color:#4a90e2; }
    .tag-purple{ background:#f3edff; color:#7d58cf; }
    .tag-orange{ background:#fff6e9; color:#d68a10; }
    .tag-green{ background:#e9f9f1; color:#2f9961; }
    .tag-gray{ background:#f1f4f8; color:#6b7d91; }
    .tag-red{ background:#fff1f3; color:#c23d53; }

    .item-meta{
      color:#5e7388;
      font-size:14px;
      font-weight:700;
      line-height:1.8;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    iframe{
      display:none;
      width:0;
      height:0;
      border:0;
    }

    @media (max-width: 1180px){
      .grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 760px){
      .page{
        padding:12px;
      }

      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .brand-title{
        font-size:26px;
      }

      .panel-head{
        flex-direction:column;
        align-items:flex-start;
      }

      .row-2{
        grid-template-columns:1fr;
      }

      .link-row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div class="brand-kicker">Event Admin</div>
        <div class="brand-title">活動後台管理</div>
      </div>

      <div class="top-actions">
        <a class="btn" href="./index.html">前台首頁</a>
        <a class="btn" href="./region.html">台灣區域頁</a>
        <button class="btn btn-warning" type="button" id="btnResetEvent">清空活動表單</button>
        <button class="btn btn-primary" type="button" id="btnReloadAll">全部重新整理</button>
      </div>
    </div>

    <div class="grid">
      <div class="stack">
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">活動表單</div>
              <div class="panel-subtitle">新增 / 修改 / 刪除活動，支援多個連結</div>
            </div>
          </div>

          <div class="panel-body">
            <div class="form-grid">
              <div class="field">
                <label for="password">管理密碼</label>
                <input id="password" type="password" value="12345678" autocomplete="off">
                <small>請改成你在 Apps Script 裡設定的 ADMIN_PASSWORD。</small>
              </div>

              <input id="eventId" type="hidden">

              <div class="field">
                <label for="eventTitle">活動名稱</label>
                <input id="eventTitle" type="text" placeholder="例如：工程安全教育">
              </div>

              <div class="row-2">
                <div class="field">
                  <label for="eventStart">開始時間</label>
                  <input id="eventStart" type="datetime-local">
                </div>
                <div class="field">
                  <label for="eventEnd">結束時間</label>
                  <input id="eventEnd" type="datetime-local">
                </div>
              </div>

              <div class="inline-check">
                <input id="eventAllDay" type="checkbox">
                <label for="eventAllDay" style="font-weight:900;color:#35516d;">全天活動</label>
              </div>

              <div class="row-2">
                <div class="field">
                  <label for="eventType">活動類型</label>
                  <select id="eventType">
                    <option value="活動">活動</option>
                    <option value="會議">會議</option>
                    <option value="現勘">現勘</option>
                  </select>
                </div>

                <div class="field">
                  <label for="eventRegion">活動區域</label>
                  <select id="eventRegion">
                    <option value="">自動判斷</option>
                    <option value="北部">北部</option>
                    <option value="中部">中部</option>
                    <option value="南部">南部</option>
                    <option value="東部">東部</option>
                    <option value="離島">離島</option>
                    <option value="未分類">未分類</option>
                  </select>
                </div>
              </div>

              <div class="field">
                <label for="eventLocation">活動地點</label>
                <input id="eventLocation" type="text" placeholder="例如：南投市文化中心">
              </div>

              <div class="field">
                <label for="eventDescription">活動內容</label>
                <textarea id="eventDescription" placeholder="可輸入活動詳細說明"></textarea>
              </div>

              <div class="row-2">
                <div class="field">
                  <label for="eventColor">活動顏色</label>
                  <input id="eventColor" type="color" value="#4a90e2">
                </div>
                <div class="field">
                  <label for="eventLinksJson">連結資料儲存</label>
                  <input id="eventLinksJson" type="text" readonly placeholder="系統自動產生">
                </div>
              </div>

              <div class="section-card">
                <div class="section-head">
                  <div class="section-title">活動連結</div>
                  <button class="btn btn-green" type="button" id="btnAddLink">新增連結</button>
                </div>
                <div class="links-wrap" id="eventLinksWrap"></div>
              </div>

              <div class="action-row">
                <button class="btn btn-primary" type="button" id="btnSaveEvent">儲存活動</button>
                <button class="btn btn-danger" type="button" id="btnDeleteEvent">刪除活動</button>
              </div>
            </div>

            <div class="status-box" id="eventStatusBox">尚未操作。</div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">公告表單</div>
              <div class="panel-subtitle">新增 / 修改 / 刪除重點布告欄內容</div>
            </div>
          </div>

          <div class="panel-body">
            <div class="form-grid">
              <input id="noticeId" type="hidden">

              <div class="field">
                <label for="noticeTitle">公告標題</label>
                <input id="noticeTitle" type="text" placeholder="例如：7/12 中部演訓注意事項">
              </div>

              <div class="field">
                <label for="noticeMessage">公告內容</label>
                <textarea id="noticeMessage" placeholder="請輸入公告內容"></textarea>
              </div>

              <div class="row-2">
                <div class="field">
                  <label for="noticePriority">優先順序</label>
                  <input id="noticePriority" type="number" value="50" min="0" step="1">
                </div>

                <div class="field">
                  <label>置頂設定</label>
                  <div class="inline-check">
                    <input id="noticePinned" type="checkbox" checked>
                    <label for="noticePinned" style="font-weight:900;color:#35516d;">置頂公告</label>
                  </div>
                </div>
              </div>

              <div class="action-row">
                <button class="btn btn-primary" type="button" id="btnSaveNotice">儲存公告</button>
                <button class="btn btn-danger" type="button" id="btnDeleteNotice">刪除公告</button>
                <button class="btn btn-warning" type="button" id="btnResetNotice">清空公告表單</button>
              </div>
            </div>

            <div class="status-box" id="noticeStatusBox">尚未操作。</div>
          </div>
        </div>
      </div>

      <div class="stack">
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">活動清單</div>
              <div class="panel-subtitle">點選編輯即可帶入活動表單</div>
            </div>
          </div>

          <div class="panel-body">
            <div class="toolbar">
              <div class="search">
                <input id="eventSearchInput" type="text" placeholder="搜尋活動名稱、地點、區域、類型">
              </div>
              <div class="count-badge" id="eventCountBadge">共 0 筆</div>
            </div>

            <div class="list" id="eventList">
              <div class="loading-box">活動資料載入中...</div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">公告清單</div>
              <div class="panel-subtitle">點選編輯即可帶入公告表單</div>
            </div>
          </div>

          <div class="panel-body">
            <div class="toolbar">
              <div class="search">
                <input id="noticeSearchInput" type="text" placeholder="搜尋公告標題、內容">
              </div>
              <div class="count-badge" id="noticeCountBadge">共 0 筆</div>
            </div>

            <div class="list" id="noticeList">
              <div class="loading-box">公告資料載入中...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <iframe name="hiddenFrame" id="hiddenFrame"></iframe>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxUz8ob0qV6G7cmGAYwqKvR7UCisLAEsiKv2GKqwKmST7HG1YsO2iTFgSIZIulicIqi/exec';

    let allEvents = [];
    let allAnnouncements = [];
    let eventLinkRowSeq = 0;

    function $(id) {
      return document.getElementById(id);
    }

    function safe(v) {
      return String(v == null ? '' : v).replace(/[&<>"']/g, function(s) {
        return {
          '&':'&amp;',
          '<':'&lt;',
          '>':'&gt;',
          '"':'&quot;',
          "'":'&#39;'
        }[s];
      });
    }

    function safeText(v, fallback = '') {
      const s = String(v == null ? '' : v).trim();
      return s || fallback;
    }

    function jsonp(url, timeoutMs = 12000) {
      return new Promise((resolve, reject) => {
        const cbName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        let done = false;
        let timer = null;
        let script = null;

        function cleanup() {
          if (timer) clearTimeout(timer);
          if (script && script.parentNode) script.parentNode.removeChild(script);
          try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
        }

        window[cbName] = function(data) {
          if (done) return;
          done = true;
          cleanup();
          resolve(data);
        };

        script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
        script.async = true;

        script.onerror = function() {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('JSONP 載入失敗'));
        };

        timer = setTimeout(function() {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('JSONP 載入逾時'));
        }, timeoutMs);

        document.body.appendChild(script);
      });
    }

    function parseDate(v) {
      if (!v) return null;
      const d = new Date(v);
      return isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(v, allDay) {
      const d = parseDate(v);
      if (!d) return safeText(v, '未設定');

      if (allDay) {
        return d.toLocaleDateString('zh-TW', {
          year:'numeric',
          month:'2-digit',
          day:'2-digit',
          weekday:'short'
        });
      }

      return d.toLocaleString('zh-TW', {
        year:'numeric',
        month:'2-digit',
        day:'2-digit',
        hour:'2-digit',
        minute:'2-digit',
        hour12:false
      });
    }

    function toDatetimeLocalString(v) {
      const d = parseDate(v);
      if (!d) return '';
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      return yyyy + '-' + mm + '-' + dd + 'T' + hh + ':' + mi;
    }

    function getTypeColor(type) {
      if (type === '會議') return '#8e6dd8';
      if (type === '現勘') return '#f5a623';
      return '#4a90e2';
    }

    function normalizeEvents(rawEvents) {
      if (!Array.isArray(rawEvents)) return [];

      return rawEvents.map(function(e) {
        const p = e && e.extendedProps ? e.extendedProps : {};
        const eventType = safeText(p.eventType, '活動');

        return {
          id: safeText(e.id, 'EVT-' + Math.random().toString(36).slice(2)),
          title: safeText(e.title, '未命名活動'),
          start: safeText(e.start, ''),
          end: safeText(e.end, ''),
          allDay: !!e.allDay,
          color: safeText(e.color, getTypeColor(eventType)),
          extendedProps: {
            location: safeText(p.location, ''),
            description: safeText(p.description, ''),
            updateAt: safeText(p.updateAt, ''),
            region: safeText(p.region, '未分類'),
            eventType: eventType,
            links: Array.isArray(p.links) ? p.links : []
          }
        };
      });
    }

    function normalizeAnnouncements(rawList) {
      if (!Array.isArray(rawList)) return [];

      return rawList.map(function(a) {
        return {
          id: safeText(a.id, 'ANN-' + Math.random().toString(36).slice(2)),
          title: safeText(a.title, '未命名公告'),
          message: safeText(a.message, ''),
          isPinned: !!a.isPinned,
          priority: Number(a.priority || 0),
          updateAt: safeText(a.updateAt, '')
        };
      });
    }

    function setStatus(boxId, type, text) {
      const box = $(boxId);
      if (!text) {
        box.textContent = '';
        return;
      }

      if (type === 'ok') {
        box.innerHTML = '<div class="ok-box">' + safe(text) + '</div>';
      } else if (type === 'error') {
        box.innerHTML = '<div class="error-box">' + safe(text) + '</div>';
      } else if (type === 'warn') {
        box.innerHTML = '<div class="warn-box">' + safe(text) + '</div>';
      } else {
        box.innerHTML = '<div class="loading-box">' + safe(text) + '</div>';
      }
    }

    function createHiddenForm(data) {
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = API_URL;
      form.target = 'hiddenFrame';
      form.style.display = 'none';

      Object.keys(data).forEach(function(key) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = data[key] == null ? '' : String(data[key]);
        form.appendChild(input);
      });

      document.body.appendChild(form);
      return form;
    }

    function validateCommon() {
      if (!safeText(API_URL) || API_URL === 'YOUR_GAS_WEBAPP_URL') {
        return '尚未設定 API_URL，請先把 admin.html 裡的 YOUR_GAS_WEBAPP_URL 換成你的 Apps Script 網址。';
      }

      if (!safeText($('password').value)) {
        return '請輸入管理密碼。';
      }

      return '';
    }

    function addEventLinkRow(data) {
      const wrap = $('eventLinksWrap');
      const rowId = 'eventLinkRow_' + (++eventLinkRowSeq);

      const row = document.createElement('div');
      row.className = 'link-row';
      row.id = rowId;

      row.innerHTML = `
        <input type="text" class="event-link-label" placeholder="連結名稱，例如：報名表" value="${safe(data && data.label || '')}">
        <input type="text" class="event-link-url" placeholder="連結網址，例如：https://example.com" value="${safe(data && data.url || '')}">
        <button class="btn btn-danger" type="button">刪除</button>
      `;

      row.querySelector('button').addEventListener('click', function() {
        row.remove();
        syncEventLinksJson();
      });

      row.querySelectorAll('input').forEach(function(input) {
        input.addEventListener('input', syncEventLinksJson);
      });

      wrap.appendChild(row);
      syncEventLinksJson();
    }

    function clearEventLinkRows() {
      $('eventLinksWrap').innerHTML = '';
      syncEventLinksJson();
    }

    function collectEventLinks() {
      const rows = Array.from(document.querySelectorAll('#eventLinksWrap .link-row'));
      return rows.map(function(row) {
        const label = safeText(row.querySelector('.event-link-label')?.value);
        const urlRaw = safeText(row.querySelector('.event-link-url')?.value);

        if (!label || !urlRaw) return null;

        const url = /^https?:\/\//i.test(urlRaw) ? urlRaw : 'https://' + urlRaw;
        return { label: label, url: url };
      }).filter(Boolean);
    }

    function syncEventLinksJson() {
      $('eventLinksJson').value = JSON.stringify(collectEventLinks());
    }

    function resetEventForm() {
      $('eventId').value = '';
      $('eventTitle').value = '';
      $('eventStart').value = '';
      $('eventEnd').value = '';
      $('eventAllDay').checked = false;
      $('eventType').value = '活動';
      $('eventRegion').value = '';
      $('eventLocation').value = '';
      $('eventDescription').value = '';
      $('eventColor').value = '#4a90e2';
      $('eventLinksJson').value = '[]';
      clearEventLinkRows();
      addEventLinkRow();
      setStatus('eventStatusBox', 'ok', '已切換為新增活動模式。');
    }

    function fillEventForm(e) {
      $('eventId').value = safeText(e.id, '');
      $('eventTitle').value = safeText(e.title, '');
      $('eventStart').value = toDatetimeLocalString(e.start);
      $('eventEnd').value = toDatetimeLocalString(e.end);
      $('eventAllDay').checked = !!e.allDay;
      $('eventType').value = safeText(e.extendedProps && e.extendedProps.eventType, '活動');
      $('eventRegion').value = safeText(e.extendedProps && e.extendedProps.region, '');
      $('eventLocation').value = safeText(e.extendedProps && e.extendedProps.location, '');
      $('eventDescription').value = safeText(e.extendedProps && e.extendedProps.description, '');
      $('eventColor').value = safeText(e.color, getTypeColor(safeText(e.extendedProps && e.extendedProps.eventType, '活動')));

      clearEventLinkRows();
      const links = Array.isArray(e.extendedProps && e.extendedProps.links) ? e.extendedProps.links : [];
      if (links.length) {
        links.forEach(function(link) { addEventLinkRow(link); });
      } else {
        addEventLinkRow();
      }

      syncEventLinksJson();
      setStatus('eventStatusBox', 'ok', '已帶入活動資料，可直接修改後儲存。');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function validateEventForm() {
      const commonErr = validateCommon();
      if (commonErr) return commonErr;

      if (!safeText($('eventTitle').value)) return '請輸入活動名稱。';
      if (!safeText($('eventStart').value)) return '請輸入開始時間。';

      return '';
    }

    function submitEventUpsert() {
      const err = validateEventForm();
      if (err) {
        setStatus('eventStatusBox', 'warn', err);
        return;
      }

      syncEventLinksJson();

      const data = {
        action: 'upsert_event',
        password: safeText($('password').value),
        id: safeText($('eventId').value),
        title: safeText($('eventTitle').value),
        start: safeText($('eventStart').value),
        end: safeText($('eventEnd').value),
        allDay: $('eventAllDay').checked ? 'true' : 'false',
        location: safeText($('eventLocation').value),
        description: safeText($('eventDescription').value),
        color: safeText($('eventColor').value),
        linksJson: safeText($('eventLinksJson').value, '[]'),
        region: safeText($('eventRegion').value),
        eventType: safeText($('eventType').value, '活動')
      };

      const form = createHiddenForm(data);
      const isUpdate = !!data.id;

      setStatus('eventStatusBox', 'loading', '活動資料送出中，請稍候...');

      form.submit();

      setTimeout(function() {
        if (form.parentNode) form.parentNode.removeChild(form);
      }, 1200);

      setTimeout(async function() {
        try {
          await loadEvents();
          setStatus('eventStatusBox', 'ok', isUpdate ? '活動已更新。' : '活動已新增。');
          if (!isUpdate) resetEventForm();
        } catch (e) {
          setStatus('eventStatusBox', 'error', '送出後重新讀取活動失敗，請按全部重新整理。');
        }
      }, 1500);
    }

    function submitEventDelete() {
      const commonErr = validateCommon();
      if (commonErr) {
        setStatus('eventStatusBox', 'warn', commonErr);
        return;
      }

      const id = safeText($('eventId').value);
      if (!id) {
        setStatus('eventStatusBox', 'warn', '請先從活動清單選擇一筆活動。');
        return;
      }

      if (!confirm('確定要刪除這筆活動嗎？刪除後無法復原。')) return;

      const form = createHiddenForm({
        action: 'delete_event',
        password: safeText($('password').value),
        id: id
      });

      setStatus('eventStatusBox', 'loading', '活動刪除中，請稍候...');
      form.submit();

      setTimeout(function() {
        if (form.parentNode) form.parentNode.removeChild(form);
      }, 1200);

      setTimeout(async function() {
        try {
          await loadEvents();
          resetEventForm();
          setStatus('eventStatusBox', 'ok', '活動已刪除。');
        } catch (e) {
          setStatus('eventStatusBox', 'error', '刪除後重新讀取活動失敗，請按全部重新整理。');
        }
      }, 1500);
    }

    function resetNoticeForm() {
      $('noticeId').value = '';
      $('noticeTitle').value = '';
      $('noticeMessage').value = '';
      $('noticePinned').checked = true;
      $('noticePriority').value = '50';
      setStatus('noticeStatusBox', 'ok', '已切換為新增公告模式。');
    }

    function fillNoticeForm(n) {
      $('noticeId').value = safeText(n.id, '');
      $('noticeTitle').value = safeText(n.title, '');
      $('noticeMessage').value = safeText(n.message, '');
      $('noticePinned').checked = !!n.isPinned;
      $('noticePriority').value = String(Number(n.priority || 0));
      setStatus('noticeStatusBox', 'ok', '已帶入公告資料，可直接修改後儲存。');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function validateNoticeForm() {
      const commonErr = validateCommon();
      if (commonErr) return commonErr;

      if (!safeText($('noticeTitle').value)) return '請輸入公告標題。';
      if (!safeText($('noticeMessage').value)) return '請輸入公告內容。';

      return '';
    }

    function submitNoticeUpsert() {
      const err = validateNoticeForm();
      if (err) {
        setStatus('noticeStatusBox', 'warn', err);
        return;
      }

      const data = {
        action: 'upsert_announcement',
        password: safeText($('password').value),
        id: safeText($('noticeId').value),
        title: safeText($('noticeTitle').value),
        message: safeText($('noticeMessage').value),
        isPinned: $('noticePinned').checked ? 'true' : 'false',
        priority: safeText($('noticePriority').value, '0')
      };

      const form = createHiddenForm(data);
      const isUpdate = !!data.id;

      setStatus('noticeStatusBox', 'loading', '公告資料送出中，請稍候...');
      form.submit();

      setTimeout(function() {
        if (form.parentNode) form.parentNode.removeChild(form);
      }, 1200);

      setTimeout(async function() {
        try {
          await loadAnnouncements();
          setStatus('noticeStatusBox', 'ok', isUpdate ? '公告已更新。' : '公告已新增。');
          if (!isUpdate) resetNoticeForm();
        } catch (e) {
          setStatus('noticeStatusBox', 'error', '送出後重新讀取公告失敗，請按全部重新整理。');
        }
      }, 1500);
    }

    function submitNoticeDelete() {
      const commonErr = validateCommon();
      if (commonErr) {
        setStatus('noticeStatusBox', 'warn', commonErr);
        return;
      }

      const id = safeText($('noticeId').value);
      if (!id) {
        setStatus('noticeStatusBox', 'warn', '請先從公告清單選擇一筆公告。');
        return;
      }

      if (!confirm('確定要刪除這筆公告嗎？刪除後無法復原。')) return;

      const form = createHiddenForm({
        action: 'delete_announcement',
        password: safeText($('password').value),
        id: id
      });

      setStatus('noticeStatusBox', 'loading', '公告刪除中，請稍候...');
      form.submit();

      setTimeout(function() {
        if (form.parentNode) form.parentNode.removeChild(form);
      }, 1200);

      setTimeout(async function() {
        try {
          await loadAnnouncements();
          resetNoticeForm();
          setStatus('noticeStatusBox', 'ok', '公告已刪除。');
        } catch (e) {
          setStatus('noticeStatusBox', 'error', '刪除後重新讀取公告失敗，請按全部重新整理。');
        }
      }, 1500);
    }

    function renderEventList(events) {
      const list = $('eventList');

      if (!Array.isArray(events) || !events.length) {
        list.innerHTML = '<div class="loading-box">目前沒有活動資料。</div>';
        $('eventCountBadge').textContent = '共 0 筆';
        return;
      }

      $('eventCountBadge').textContent = '共 ' + events.length + ' 筆';

      list.innerHTML = events.map(function(e) {
        const location = safeText(e.extendedProps && e.extendedProps.location, '未填地點');
        const region = safeText(e.extendedProps && e.extendedProps.region, '未分類');
        const desc = safeText(e.extendedProps && e.extendedProps.description, '未填說明');
        const updateAt = safeText(e.extendedProps && e.extendedProps.updateAt, '未更新');
        const eventType = safeText(e.extendedProps && e.extendedProps.eventType, '活動');
        const links = Array.isArray(e.extendedProps && e.extendedProps.links) ? e.extendedProps.links : [];
        const color = safeText(e.color, getTypeColor(eventType));
        const typeClass = eventType === '會議' ? 'tag-purple' : (eventType === '現勘' ? 'tag-orange' : 'tag-blue');

        return (
          '<div class="item">' +
            '<div class="item-top">' +
              '<div class="item-main">' +
                '<div class="dot" style="background:' + safe(color) + ';"></div>' +
                '<div>' +
                  '<div class="item-title">' + safe(e.title) + '</div>' +
                  '<div class="item-tags">' +
                    '<span class="tag tag-gray">' + safe(region) + '</span>' +
                    '<span class="tag ' + typeClass + '">' + safe(eventType) + '</span>' +
                    '<span class="tag tag-green">' + (e.allDay ? '全天' : '一般時段') + '</span>' +
                    '<span class="tag tag-gray">連結 ' + links.length + ' 筆</span>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div class="item-meta">' +
              safe(formatDateTime(e.start, e.allDay)) + (e.end ? ' → ' + safe(formatDateTime(e.end, e.allDay)) : '') + '\n' +
              safe(location) + '\n' +
              safe(desc) + '\n' +
              '最後更新：' + safe(updateAt) +
            '</div>' +
            '<div class="item-actions">' +
              '<button class="btn btn-primary" type="button" data-edit-event="' + safe(e.id) + '">編輯活動</button>' +
            '</div>' +
          '</div>'
        );
      }).join('');

      list.querySelectorAll('[data-edit-event]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const id = btn.getAttribute('data-edit-event');
          const found = allEvents.find(function(x) { return String(x.id) === String(id); });
          if (found) fillEventForm(found);
        });
      });
    }

    function renderNoticeList(notices) {
      const list = $('noticeList');

      if (!Array.isArray(notices) || !notices.length) {
        list.innerHTML = '<div class="loading-box">目前沒有公告資料。</div>';
        $('noticeCountBadge').textContent = '共 0 筆';
        return;
      }

      $('noticeCountBadge').textContent = '共 ' + notices.length + ' 筆';

      list.innerHTML = notices.map(function(n) {
        return (
          '<div class="item">' +
            '<div class="item-top">' +
              '<div class="item-main">' +
                '<div class="dot" style="background:#d89218;"></div>' +
                '<div>' +
                  '<div class="item-title">' + safe(n.title) + '</div>' +
                  '<div class="item-tags">' +
                    (n.isPinned ? '<span class="tag tag-orange">置頂</span>' : '<span class="tag tag-gray">一般</span>') +
                    '<span class="tag tag-red">Priority ' + safe(n.priority) + '</span>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div class="item-meta">' +
              safe(n.message) + '\n' +
              '最後更新：' + safe(n.updateAt || '未更新') +
            '</div>' +
            '<div class="item-actions">' +
              '<button class="btn btn-primary" type="button" data-edit-notice="' + safe(n.id) + '">編輯公告</button>' +
            '</div>' +
          '</div>'
        );
      }).join('');

      list.querySelectorAll('[data-edit-notice]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const id = btn.getAttribute('data-edit-notice');
          const found = allAnnouncements.find(function(x) { return String(x.id) === String(id); });
          if (found) fillNoticeForm(found);
        });
      });
    }

    function getFilteredEvents() {
      const keyword = safeText($('eventSearchInput').value).toLowerCase();
      if (!keyword) return allEvents.slice();

      return allEvents.filter(function(e) {
        const title = safeText(e.title).toLowerCase();
        const location = safeText(e.extendedProps && e.extendedProps.location).toLowerCase();
        const region = safeText(e.extendedProps && e.extendedProps.region).toLowerCase();
        const desc = safeText(e.extendedProps && e.extendedProps.description).toLowerCase();
        const eventType = safeText(e.extendedProps && e.extendedProps.eventType).toLowerCase();

        return (
          title.includes(keyword) ||
          location.includes(keyword) ||
          region.includes(keyword) ||
          desc.includes(keyword) ||
          eventType.includes(keyword)
        );
      });
    }

    function getFilteredNotices() {
      const keyword = safeText($('noticeSearchInput').value).toLowerCase();
      if (!keyword) return allAnnouncements.slice();

      return allAnnouncements.filter(function(n) {
        const title = safeText(n.title).toLowerCase();
        const message = safeText(n.message).toLowerCase();
        return title.includes(keyword) || message.includes(keyword);
      });
    }

    async function loadEvents() {
      setStatus('eventStatusBox', 'loading', '活動資料讀取中...');

      const data = await jsonp(API_URL + '?action=list_events');

      if (!data || !data.ok) {
        throw new Error((data && data.message) ? data.message : '活動 API 回傳失敗');
      }

      allEvents = normalizeEvents(data.events || []);
      allEvents.sort(function(a, b) {
        const ta = parseDate(a.start) ? parseDate(a.start).getTime() : 0;
        const tb = parseDate(b.start) ? parseDate(b.start).getTime() : 0;
        return ta - tb;
      });

      renderEventList(getFilteredEvents());
      setStatus('eventStatusBox', 'ok', '活動資料已載入。');
    }

    async function loadAnnouncements() {
      setStatus('noticeStatusBox', 'loading', '公告資料讀取中...');

      const data = await jsonp(API_URL + '?action=list_announcements');

      if (!data || !data.ok) {
        throw new Error((data && data.message) ? data.message : '公告 API 回傳失敗');
      }

      allAnnouncements = normalizeAnnouncements(data.announcements || []);
      allAnnouncements.sort(function(a, b) {
        if (a.isPinned !== b.isPinned) return a.isPinned ? -1 : 1;
        if (a.priority !== b.priority) return b.priority - a.priority;
        return 0;
      });

      renderNoticeList(getFilteredNotices());
      setStatus('noticeStatusBox', 'ok', '公告資料已載入。');
    }

    async function reloadAll() {
      await Promise.all([loadEvents(), loadAnnouncements()]);
    }

    function bindEvents() {
      $('btnAddLink').addEventListener('click', function() {
        addEventLinkRow();
      });

      $('btnSaveEvent').addEventListener('click', submitEventUpsert);
      $('btnDeleteEvent').addEventListener('click', submitEventDelete);
      $('btnResetEvent').addEventListener('click', resetEventForm);

      $('btnSaveNotice').addEventListener('click', submitNoticeUpsert);
      $('btnDeleteNotice').addEventListener('click', submitNoticeDelete);
      $('btnResetNotice').addEventListener('click', resetNoticeForm);

      $('btnReloadAll').addEventListener('click', function() {
        reloadAll().catch(function(err) {
          setStatus('eventStatusBox', 'error', err && err.message ? err.message : '重新整理失敗');
          setStatus('noticeStatusBox', 'error', err && err.message ? err.message : '重新整理失敗');
        });
      });

      $('eventSearchInput').addEventListener('input', function() {
        renderEventList(getFilteredEvents());
      });

      $('noticeSearchInput').addEventListener('input', function() {
        renderNoticeList(getFilteredNotices());
      });

      $('eventAllDay').addEventListener('change', function() {
        if ($('eventAllDay').checked && $('eventStart').value && !$('eventEnd').value) {
          $('eventEnd').value = $('eventStart').value;
        }
      });

      $('eventType').addEventListener('change', function() {
        const type = safeText($('eventType').value, '活動');
        $('eventColor').value = getTypeColor(type);
      });
    }

    async function boot() {
      try {
        if (!API_URL || API_URL === 'YOUR_GAS_WEBAPP_URL') {
          throw new Error('尚未設定 API_URL，請先把 admin.html 裡的 YOUR_GAS_WEBAPP_URL 換成你的 Apps Script 網址。');
        }

        bindEvents();
        resetEventForm();
        resetNoticeForm();
        await reloadAll();
      } catch (err) {
        console.error(err);
        setStatus('eventStatusBox', 'error', err && err.message ? err.message : '活動系統初始化失敗');
        setStatus('noticeStatusBox', 'error', err && err.message ? err.message : '公告系統初始化失敗');
        $('eventList').innerHTML = '<div class="error-box">無法載入活動資料，請確認 Apps Script 是否已部署、API_URL 是否正確、Web App 權限是否為任何人。</div>';
        $('noticeList').innerHTML = '<div class="error-box">無法載入公告資料，請確認 Apps Script 是否已部署、API_URL 是否正確、Web App 權限是否為任何人。</div>';
      }
    }

    boot();
  </script>
</body>
</html>
